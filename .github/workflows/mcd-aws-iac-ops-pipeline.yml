name: mcd-aws-iac-ops-pipeline
on:
  workflow_dispatch:
    inputs:
      project-name:
        description: "Project name to run Terragrunt in"
        required: true
        default: "dmz"
        type: choice
        options:
          - dmz
          - foundation
          - share
          - wukong
          - wukongboss
          - aurum
          - bossfoundation
          - deltaglobal-coreserv
          - deltaglobal-orderserv
          - zhangzh-test
      env-folder:
        description: "Target folder to run Terragrunt in"
        required: true
        default: "infra"
        type: choice
        options:
          - infra
          - dev
          - sit
          - uat
          - prod
          - test
      target-folder:
        description: "Target directory (e.g. dx). Empty = run all under ap-east-1"
        required: false
        default: ""
      aws-region:
        description: "AWS Region"
        required: true
        default: "ap-east-1"
        type: choice
        options:
          - ap-east-1
      module-name:
        description: "Terraform module name (comma separated)"
        required: false
        default: ""

# 全局环境变量（精简+修复路径）
env:
  TF_INPUT: false
  BASE_DIR: integrator-environments
  WORKDIR: ${{ env.BASE_DIR }}/${{ inputs.project-name }}/${{ inputs.env-folder }}/${{ inputs.aws-region }}/${{ inputs.target-folder }}
  AWS_REGION: ${{ inputs.aws-region }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_IAM_ROLE: ${{ secrets.AWS_IAM_ROLE }}

  OPENTOFU_VERSION: "1.6.2"
  TERRAGRUNT_VERSION: "0.54.8"
  TERRAGRUNT_TFPATH: /usr/local/bin/tofu

  SCAN_KICS: "kics-results.all"
  SCAN_TFSEC: "tfsec-results.json"
  BUCKET_ARTIFACT: "terraform-backend-state-ap-east-1"
  RUN_ID: ${{ github.run_id }}

  # 审批人配置（双审批）
  APPROVER_SECURITY: "CN-anchnettiantod_mcdcn@example.com"
  APPROVER_DEPLOY: "CN-davidzhao_mcdcn@example.com,CN-jingfeng_mcdcn@example.com"
  APPROVE_TIMEOUT: "1d"

jobs:
  # 阶段1：初始化 + Plan + 安全扫描
  terragrunt-plan:
    name: Terragrunt Plan & Security Scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      exit_code: ${{ steps.plan.outputs.exit_code }}
      tf_workdir: ${{ steps.plan.outputs.tf_workdir }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ env.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # 安装依赖（复用函数，无冗余）
      - name: Install OpenTofu + Terragrunt
        run: |
          wget -q https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip -q tofu_*.zip -d /usr/local/bin/ && chmod +x /usr/local/bin/tofu && rm -f tofu_*.zip
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64 -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Install Rclone
        uses: AnimMouse/setup-rclone@v1

      - name: Configure SSH for Git Modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PUBLIC }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa ~/.ssh/id_rsa.pub
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # 核心Plan步骤（修复原有逻辑Bug）
      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ env.WORKDIR }}
        run: |
          export TERRAGRUNT_TF_BINARY=tofu
          EXIT_CODE=0

          if [[ -z "${{ inputs.target-folder }}" ]]; then
            terragrunt plan-all -input=false -out=plan.tfplan -detailed-exitcode || EXIT_CODE=$?
            find . -name "plan.tfplan" -exec dirname {} \; | while read dir; do
              pdir=$(echo "$dir" | cut -d'/' -f2)
              mkdir -p ../plan-output/$pdir
              (cd $dir && terragrunt show -json plan.tfplan > ../../plan-output/$pdir/plan.json)
            done
          else
            mkdir -p plan-output
            if [[ -z "${{ inputs.module-name }}" ]]; then
              terragrunt plan -input=false -out=plan.tfplan -detailed-exitcode || EXIT_CODE=$?
            else
              target=$(echo "${{ inputs.module-name }}" | tr ',' '\n' | sed 's/^/--target=module./' | tr '\n' ' ')
              terragrunt plan -input=false $target -out=plan.tfplan -detailed-exitcode || EXIT_CODE=$?
            fi
            terragrunt show -json plan.tfplan > plan-output/plan.json
            TF_WD=$(terragrunt terragrunt-info | grep WorkingDir | cut -d'"' -f4 | awk -F'/.terragrunt-cache' '{print $2}')
            echo "tf_workdir=$TF_WD" >> $GITHUB_OUTPUT
          fi
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      # 安全扫描
      - name: KICS Security Scan
        continue-on-error: true
        run: docker run -t -v "$PWD:/data" checkmarx/kics:latest scan -p /data/ --report-formats all -e "**/.terraform/**" -o "/data/${{ env.SCAN_KICS }}"

      - name: TFSec Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          format: json
          soft_fail: false
          out: ${{ env.SCAN_TFSEC }}
          working_dir: ${{ env.WORKDIR }}

      # 上传产物到S3
      - name: Upload Artifacts to S3
        run: |
          rclone config create s3 s3 provider=AWS region=${{ env.AWS_REGION }} env_auth=true acl=private sse_kms_key_id=${{ secrets.S3_KMS_ARN }} server_side_encryption=aws:kms
          S3_BASE="s3:${{ env.BUCKET_ARTIFACT }}/pipeline-artifacts/${{ env.WORKDIR }}"

          if [[ -n "${{ inputs.target-folder }}" ]]; then
            rclone copy ${{ env.WORKDIR }}/plan.tfplan $S3_BASE/plans/${{ env.RUN_ID }}/
            rclone copy ${{ env.WORKDIR }}/plan-output/ $S3_BASE/plans/${{ env.RUN_ID }}/
            rclone copy ${{ env.SCAN_KICS }}/ $S3_BASE/scans/${{ env.RUN_ID }}/
            rclone copy ${{ env.SCAN_TFSEC }} $S3_BASE/scans/${{ env.RUN_ID }}/
          else
            find ${{ env.BASE_DIR }} -name "plan.tfplan" | while read f; do
              folder=$(echo $f | sed -E "s|${{ env.BASE_DIR }}/||;s|/plan.tfplan||")
              rclone copy $f $S3_BASE/$folder/plans/${{ env.RUN_ID }}/
            done
          fi

      # 缓存工作目录给Apply使用
      - name: Upload Workspace Cache
        uses: actions/upload-artifact@v4
        with:
          name: terragrunt-workspace-${{ env.RUN_ID }}
          path: ${{ env.BASE_DIR }}/
          include-hidden-files: true
          retention-days: 7

  # ==================== 双审批流程 ====================
  # 第一关：安全合规审批
  approval-security:
    name: 🔐 Security Approval
    needs: terragrunt-plan
    if: github.ref_name == 'main' || github.ref_name == 'production'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: zhangzh@anchnet.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "🚨 IaC安全审批请求 - ${{ inputs.project-name }}/${{ inputs.env-folder }}"
          to: ${{ env.APPROVER_SECURITY }}
          from: GitHub Actions IaC Pipeline
          body: |
            部署任务需要安全审批：
            项目：${{ inputs.project-name }}
            环境：${{ inputs.env-folder }}
            构建ID：${{ env.RUN_ID }}
            链接：https://github.com/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}

      - name: Security Team Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GIT_TOKEN }}
          approvers: ${{ env.APPROVER_SECURITY }}
          minimum-approvals: 1
          issue-title: "【安全审批】AWS IaC 部署 - ${{ inputs.project-name }}/${{ inputs.env-folder }}"
          issue-body: "请审核安全扫描结果并批准。\n构建链接：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}"
          timeout: ${{ env.APPROVE_TIMEOUT }}

  # 第二关：部署审批
  approval-deploy:
    name: 🚀 Deployment Approval
    needs: [terragrunt-plan, approval-security]
    if: github.ref_name == 'main' || github.ref_name == 'production'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Send Deployment Approval Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: zhangzh@anchnet.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "✅ 安全审批通过，等待部署审批 - ${{ inputs.project-name }}"
          to: ${{ env.APPROVER_DEPLOY }}
          from: GitHub Actions IaC Pipeline
          body: "安全审核已通过，请审批部署。\n构建链接：https://github.com/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}"

      - name: Deployment Team Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GIT_TOKEN }}
          approvers: ${{ env.APPROVER_DEPLOY }}
          minimum-approvals: 1
          issue-title: "【部署审批】AWS IaC 执行 - ${{ inputs.project-name }}/${{ inputs.env-folder }}"
          issue-body: "Plan已生成，确认执行Apply。\n链接：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}"
          timeout: ${{ env.APPROVE_TIMEOUT }}

  # ==================== 最终执行Apply ====================
  terragrunt-apply:
    name: Terragrunt Apply
    needs: [approval-deploy, terragrunt-plan]
    if: github.ref_name == 'main' || github.ref_name == 'production'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ env.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Tools
        run: |
          wget -q https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip -q tofu_*.zip -d /usr/local/bin/ && chmod +x /usr/local/bin/tofu && rm -f tofu_*.zip
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64 -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Download Cached Workspace
        uses: actions/download-artifact@v4
        with:
          name: terragrunt-workspace-${{ env.RUN_ID }}
          path: ${{ env.BASE_DIR }}/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Terragrunt Apply
        working-directory: ${{ env.WORKDIR }}
        run: |
          export TERRAGRUNT_TF_BINARY=tofu
          if [[ -z "${{ inputs.target-folder }}" ]]; then
            terragrunt run-all apply -auto-approve
          else
            if [[ -z "${{ inputs.module-name }}" ]]; then
              terragrunt apply -auto-approve
            else
              target=$(echo "${{ inputs.module-name }}" | tr ',' '\n' | sed 's/^/--target=module./' | tr '\n' ' ')
              terragrunt apply -auto-approve $target
            fi
          fi

      - name: Deployment Success Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: zhangzh@anchnet.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "✅ IaC部署成功 - ${{ inputs.project-name }}/${{ inputs.env-folder }}"
          to: ${{ env.APPROVER_SECURITY }},${{ env.APPROVER_DEPLOY }}
          body: "部署已完成！\n环境：${{ inputs.project-name }}/${{ inputs.env-folder }}\n构建ID：${{ env.RUN_ID }}"
