name: mcd-aws-iac-ops-pipeline
on:
  workflow_dispatch:
    inputs:
      project-name:
        description: "Project name to run Terragrunt in"
        required: true
        default: "dmz"
        type: choice
        options:
          - dmz
          - foundation
          - share
          - wukong
          - wukongboss
          - aurum
          - bossfoundation
          - deltaglobal-coreserv
          - deltaglobal-orderserv
      env-folder:
        description: "Target folder to run Terragrunt in"
        required: true
        default: "infra"
        type: choice
        options:
          - infra
          - dev
          - sit
          - uat
          - dev
          - prod
          - test
      target-folder:
        description: "The target directory to be run, for example: this directory dmz/infra/ap-east-1/{dx,natgw,tgw}, there are 3 folders. To run dx, fill in dx. Multiple folders are not supported. If it is empty, all directories under ap-east-1 will be run."
        required: false
        default: ""
      aws-region:
        description: "AWS 所在的地域"
        required: true
        default: "ap-east-1"
        type: choice
        options:
          - ap-east-1
      module-name:
        description: "The name of the terraform module to run; for example, if it is module.this, fill in this. Multiple names are separated by commas (,)."
        required: false
        default: ""

env:
  TF_INPUT: false
  WORKDIR: integrator-environments/${{ inputs.project-name }}/${{ inputs.env-folder }}/${{inputs.aws-region}}/${{ inputs.target-folder }}
  AWS_REGION: ${{ inputs.aws-region }}

  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_IAM_ROLE: ${{ secrets.AWS_IAM_ROLE }}

  TERRAGRUNT_TFPATH: /usr/local/bin/tofu
  OPENTOFU_VERSION: "1.6.2"
  TERRAGRUNT_VERSION: "0.54.8"

  KICS_RESULT: "kics-results.all"
  TFSEC_RESULT: "tfsec-results.json"
  APPROVE_USER: "Flouxtine"
  # 第二组审批人（可复用第一组或单独定义）
  APPROVE_USER_2: "CN-anchnettiantod_mcdcn"

jobs:
  # =========================== 代码扫描阶段 ===========================
  code_review:
    name: Code Review - Security Scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ env.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: KICS Scan
        continue-on-error: true
        run: |
          docker run -t -v "./":/data checkmarx/kics:latest scan -p /data/ --report-formats all -e "**/.terraform/providers/*"  -o "/data/${{ env.KICS_RESULT }}"

      - name: Tfsec Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          format: json
          soft_fail: false
          additional_args: "--out ${{ env.TFSEC_RESULT }}"
          working_dir: ${{ env.WORKDIR }}

      - name: Upload scan results to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        run: |
          rclone config create s3_static s3 provider=AWS region=$AWS_REGION env_auth=true acl=private location_constraint=$AWS_REGION sse_kms_key_id=${{ secrets.S3_KMS_ARN }} server_side_encryption=aws:kms
          rclone copy ${{ env.KICS_RESULT }}/ s3_static:${{ secrets.S3_BUCKET }}/pipeline-artifacts/${{ env.WORKDIR }}/scans/${{ github.run_id }}/
          rclone copy ${{ env.TFSEC_RESULT }} s3_static:${{ secrets.S3_BUCKET }}/pipeline-artifacts/${{ env.WORKDIR }}/scans/${{ github.run_id }}/

  # =========================== Plan 阶段 ===========================
  plan:
    name: Terragrunt Plan with OpenTofu
    runs-on: ubuntu-latest
    needs: [code_review] # 等待扫描完成（扫描失败不阻塞，但可根据需要修改）
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ env.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Opentofu and Terragrunt
        run: |
          wget https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/tofu
          rm tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip

          curl -L https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ env.WORKDIR }}
        run: |
          export TERRAGRUNT_TF_BINARY=tofu
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PUBLIC }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa.pub
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          if [[ "${{ inputs.target-folder }}" == '' ]]; then
            # 多模块：运行 plan-all，并将每个模块的 plan 文件集中到 plan-output/
            terragrunt plan-all -input=false -out=./plan.tfplan -detailed-exitcode || echo "exit_code=$?" >> $GITHUB_OUTPUT
            find . -name "plan.tfplan" -exec dirname {} \; | while read -r dir; do
              pdir=$(echo "$dir" | cut -d'/' -f2)
              mkdir -p ./plan-output/$pdir
              cp $dir/plan.tfplan ./plan-output/$pdir/plan.tfplan
              cd $pdir && terragrunt show -json ./plan.tfplan > ../plan-output/$pdir/plan.json && cd ..
            done || echo "exit_code=$?" >> $GITHUB_OUTPUT
          else
            # 单模块
            mkdir -p ./plan-output
            if [[ "${{ inputs.module-name }}" == '' ]]; then
              terragrunt plan -input=false -out=./plan.tfplan -detailed-exitcode || echo "exit_code=$?" >> $GITHUB_OUTPUT
            else
              target=$(echo "${{ inputs.module-name }}" | awk -F',' '{ for(i=1;i<=NF;i++) printf "--target=module.%s ", $i }')
              terragrunt plan -input=false $target -out=./plan.tfplan -detailed-exitcode || echo "exit_code=$?" >> $GITHUB_OUTPUT
            fi
            echo "tf_workdir=$(terragrunt terragrunt-info | grep WorkingDir | cut -d '"' -f  4  | awk -F'/.terragrunt-cache' '{print $2}')" >> $GITHUB_ENV
            terragrunt show -json ./plan.tfplan > ./plan-output/plan.json
            cp ./plan.tfplan ./plan-output/plan.tfplan
          fi

      - name: Upload Plan to S3 (Backup)
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME: "terraform-backend-state-ap-east-1"
        run: |
          rclone config create s3_static s3 provider=AWS region=$AWS_REGION env_auth=true acl=private location_constraint=$AWS_REGION sse_kms_key_id=${{ secrets.S3_KMS_ARN }} server_side_encryption=aws:kms
          if [[ "${{ inputs.target-folder }}" != '' ]]; then
            rclone copy ${{ env.WORKDIR }}/plan-output/ s3_static:${{ env.BUCKET_NAME }}/pipeline-artifacts/${{ env.WORKDIR }}/plans/${{ github.run_id }}/
          else
            find ${{ env.WORKDIR }}/plan-output -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
              pdir=$(basename "$dir")
              rclone copy "$dir" s3_static:${{ env.BUCKET_NAME }}/pipeline-artifacts/${{ env.WORKDIR }}/$pdir/plans/${{ github.run_id }}/
            done
          fi

      - name: Upload Plan as GitHub Artifact (for apply)
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKDIR }}/plan-output/
          if-no-files-found: error
          retention-days: 7

  # =========================== 首次审批 ===========================
  approval1:
    name: First Approval - GMI-Devops
    needs: [plan]
    if: github.ref_name == 'main' || github.ref_name == 'production'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Wait for first approval
        uses: trstringer/manual-approval@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          secret: ${{ secrets.GIT_TOKEN }}
          approvers: ${{ env.APPROVE_USER }}
          minimum-approvals: 1
          issue-title: "AWS-IAC 环境 ${{ env.WORKDIR }} 部署审批请求 (首次)"
          issue-body: |
            **部署信息:**
            - 提交 SHA: ${{ github.sha }}
            - 提交信息: ${{ github.event.head_commit.message }}
            - 构建产物: [查看构建日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            请审核并批准此次 AWS-IAC 环境部署（首次审批）。
          issue-labels: "deployment,approval-needed"
          timeout: 1d

  # =========================== 二次审批 ===========================
  approval2:
    name: Second Approval - GMI-Infra
    needs: [approval1]
    if: github.ref_name == 'main' || github.ref_name == 'production'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Wait for second approval
        uses: trstringer/manual-approval@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          secret: ${{ secrets.GIT_TOKEN }}
          approvers: ${{ env.APPROVE_USER_2 }}
          minimum-approvals: 1
          issue-title: "AWS-IAC 环境 ${{ env.WORKDIR }} 部署审批请求 (二次)"
          issue-body: |
            **部署信息:**
            - 提交 SHA: ${{ github.sha }}
            - 提交信息: ${{ github.event.head_commit.message }}
            - 构建产物: [查看构建日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            请审核并批准此次 AWS-IAC 环境部署（二次审批）。
          issue-labels: "deployment,approval-needed"
          timeout: 1d

  # =========================== Apply 阶段 ===========================
  apply:
    name: Terragrunt Apply with OpenTofu
    needs: [approval2]
    if: github.ref_name == 'main' || github.ref_name == 'production'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ env.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Opentofu and Terragrunt
        run: |
          wget https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/tofu
          rm tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip

          curl -L https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKDIR }}/plan-output

      - name: Terragrunt Init
        working-directory: ${{ env.WORKDIR }}
        run: |
          export TERRAGRUNT_TF_BINARY=tofu
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PUBLIC }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa.pub
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          if [[ "${{ inputs.target-folder }}" != '' ]]; then
            terragrunt init --terragrunt-non-interactive
          else
            terragrunt run-all init --terragrunt-non-interactive
          fi

      - name: Terragrunt Apply
        working-directory: ${{ env.WORKDIR }}
        id: apply
        run: |
          if [[ "${{ inputs.target-folder }}" != '' ]]; then
            # 单模块：直接应用 plan 文件
            terragrunt apply -auto-approve ./plan-output/plan.tfplan
          else
            # 多模块：遍历 plan-output 下的每个子目录并应用
            for dir in ./plan-output/*/ ; do
              if [ -f "$dir/plan.tfplan" ]; then
                echo "Applying plan in $dir"
                cd $(basename "$dir")  # 进入对应的 terragrunt 模块目录
                terragrunt apply -auto-approve "$dir/plan.tfplan"
                cd ..
              fi
            done
          fi
        continue-on-error: true # 捕获失败状态，用于通知

      - name: Upload Terraform Log
        uses: actions/upload-artifact@v4
        with:
          name: terraform-log-${{ github.run_id }}
          path: ${{ env.WORKDIR }}/terraform.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Send Email Notification on Failure
        if: steps.apply.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ AWS-IAC 部署失败 - ${{ env.WORKDIR }}"
          to: zhangzh@anchnet.com # 可配置多个邮箱
          from: GitHub Actions <actions@example.com>
          body: |
            **部署失败详情**
            - 工作流: ${{ github.workflow }}
            - 运行编号: ${{ github.run_id }}
            - 提交: ${{ github.sha }}
            - 失败步骤: ${{ steps.apply.outcome }}
            - 查看日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
